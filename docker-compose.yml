services:
  postgres:
    image: postgres:16-alpine
    container_name: yourkalinga-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: yourkalinga
      POSTGRES_PASSWORD: yourkalinga_dev
      POSTGRES_DB: yourkalinga
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: yourkalinga-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://yourkalinga:yourkalinga_dev@postgres:5432/yourkalinga
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: development
    ports:
      - '3001:3001'
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      - postgres
    command: npm run start:dev

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: yourkalinga-web
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    ports:
      - '3000:3000'
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    command: npm run dev

volumes:
  postgres_data:
